apiVersion: apps/v1
kind: Deployment
metadata:
  name: eda-ws
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eda
      comp: ws
  strategy: {}
  template:
    metadata:
      labels:
        app: eda
        comp: ws
    spec:
      containers:
        - args:
            - /bin/bash
            - -c
            - daphne -b 0.0.0.0 -p 8000 aap_eda.asgi:application
          env:
            - name: EDA_DATABASE_URL
              value: postgresql+asyncpg://postgres:secret@postgres/eda
            - name: EDA_DB_HOST
              value: eda-postgres
            - name: EDA_DB_PASSWORD
              value: secret
            - name: EDA_SECRET_KEY
              value: secret
            - name: EDA_MQ_HOST
              value: eda-redis
            - name: EDA_ALLOWED_HOSTS
              value: "['*']"
            - name: EDA_DEPLOYMENT_TYPE
              value: k8s
          envFrom:
          - configMapRef:
              name: eda-env-properties
          image: aap-eda
          imagePullPolicy: Never
          name: eda-ws
          ports:
            - containerPort: 8000
          resources: {}
      restartPolicy: Always
      initContainers:
        - name: wait-for-postgres
          image: postgresql
          command: [ 'sh', '-c', "until pg_isready -h eda-postgres -p 5432; do echo waiting for eda-postgres; sleep 2; done" ]
status: {}
