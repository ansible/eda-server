apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ./eda-api
- ./eda-scheduler
- ./eda-default-worker
- ./eda-ui
- ./postgres
- ./redis
- ./eda-activation-worker

namespace: aap-eda

labels:
- pairs:
    app: eda
  includeSelectors: true

generatorOptions:
  labels:
    app: eda

images:
- name: postgresql
  newName: quay.io/sclorg/postgresql-15-c9s
  newTag: latest

configMapGenerator:
- name: eda-env-properties
  envs: [environment.properties]
